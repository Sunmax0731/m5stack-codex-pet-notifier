[platformio]
default_envs = m5stack-core2

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
  m5stack/M5Unified
  bblanchon/ArduinoJson

[env:m5stack-core2]
board = m5stack-core2
build_flags =
  -D DEVICE_PROFILE_CORE2

[env:m5stack-gray]
board = m5stack-grey
board_build.partitions = huge_app.csv
build_flags =
  -D DEVICE_PROFILE_GRAY
